# InvenTree UI Test Configuration

# Application URL
base.url=https://demo.inventree.org

# Browser Configuration
browser=chrome
headless=true

# Timeout Configuration (in seconds)
implicit.wait=10
explicit.wait=15

# Test User Credentials
# Admin - Superuser with full access
admin.username=admin
admin.password=inventree

# AllAccess - Full CRUD permissions
allaccess.username=allaccess
allaccess.password=nolimits

# Engineer - Parts and stock only
engineer.username=engineer
engineer.password=partsonly

# Reader - View-only access
reader.username=reader
reader.password=readonly
