name: PR Tests

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Run only smoke tests on PRs for faster feedback
  smoke-tests:
    name: Smoke Tests (API + UI)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run API Smoke Tests
        working-directory: automation/api
        run: mvn clean test -Dgroups=smoke
        continue-on-error: false

      - name: Run UI Smoke Tests
        working-directory: automation/ui
        run: mvn clean test -Dgroups=smoke -Dheadless=true
        continue-on-error: false

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-smoke-test-results
          path: |
            automation/api/target/surefire-reports/
            automation/ui/target/surefire-reports/
          retention-days: 14

      - name: Comment PR with Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let apiResults = 'N/A';
            let uiResults = 'N/A';

            try {
              const apiXml = fs.readFileSync('automation/api/target/surefire-reports/testng-results.xml', 'utf8');
              const apiTotal = apiXml.match(/total="(\d+)"/)?.[1] || '0';
              const apiPassed = apiXml.match(/passed="(\d+)"/)?.[1] || '0';
              const apiFailed = apiXml.match(/failed="(\d+)"/)?.[1] || '0';
              apiResults = `Total: ${apiTotal} | ✅ Passed: ${apiPassed} | ❌ Failed: ${apiFailed}`;
            } catch (e) {
              apiResults = 'Could not parse results';
            }

            try {
              const uiXml = fs.readFileSync('automation/ui/target/surefire-reports/testng-results.xml', 'utf8');
              const uiTotal = uiXml.match(/total="(\d+)"/)?.[1] || '0';
              const uiPassed = uiXml.match(/passed="(\d+)"/)?.[1] || '0';
              const uiFailed = uiXml.match(/failed="(\d+)"/)?.[1] || '0';
              uiResults = `Total: ${uiTotal} | ✅ Passed: ${uiPassed} | ❌ Failed: ${uiFailed}`;
            } catch (e) {
              uiResults = 'Could not parse results';
            }

            const body = `## 🧪 Smoke Test Results

            ### 🚀 API Tests
            ${apiResults}

            ### 🎭 UI Tests
            ${uiResults}

            **Commit:** ${context.sha.substring(0, 7)}
            **Branch:** ${context.payload.pull_request.head.ref}

            [View Full Results](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Code Quality Check
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile API Framework
        working-directory: automation/api
        run: mvn clean compile

      - name: Compile UI Framework
        working-directory: automation/ui
        run: mvn clean compile

      - name: Check for Compilation Errors
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ All frameworks compiled successfully"
          else
            echo "❌ Compilation failed"
            exit 1
          fi
