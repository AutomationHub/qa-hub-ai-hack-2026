name: Nightly Regression Tests

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Full regression suite
  regression-tests:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        test-suite: [api, ui]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install Chrome (for UI tests)
        if: matrix.test-suite == 'ui'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run API Regression Tests
        if: matrix.test-suite == 'api'
        working-directory: automation/api
        run: |
          mvn clean test -Dgroups=regression
        continue-on-error: true

      - name: Run UI Regression Tests
        if: matrix.test-suite == 'ui'
        working-directory: automation/ui
        run: |
          mvn clean test -Dgroups=regression -Dheadless=true
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        working-directory: automation/${{ matrix.test-suite }}
        run: mvn allure:report

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.test-suite }}-results
          path: |
            automation/${{ matrix.test-suite }}/target/surefire-reports/
            automation/${{ matrix.test-suite }}/target/allure-results/
            automation/${{ matrix.test-suite }}/target/logs/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.test-suite }}-allure-report
          path: automation/${{ matrix.test-suite }}/target/site/allure-maven-plugin/
          retention-days: 30

  # Send notification on failure
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [regression-tests]
    if: failure()

    steps:
      - name: Create Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly Tests Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## ❌ Nightly Regression Tests Failed

              **Date:** ${new Date().toISOString()}
              **Workflow Run:** [View Results](${context.payload.repository.html_url}/actions/runs/${context.runId})

              ### Actions Required
              - Review test failures
              - Check application stability
              - Investigate failed test cases

              ### Test Results
              Download artifacts from the workflow run to view detailed results.
              `,
              labels: ['bug', 'test-failure', 'nightly']
            });

  # Generate trend report
  trend-report:
    name: Generate Trend Report
    runs-on: ubuntu-latest
    needs: [regression-tests]
    if: always()

    steps:
      - name: Download Test Results
        uses: actions/download-artifact@v4

      - name: Generate Trend Summary
        run: |
          echo "# 📈 Nightly Test Trend" >> trend.md
          echo "" >> trend.md
          echo "**Date:** $(date)" >> trend.md
          echo "" >> trend.md

          # This would typically read from stored historical data
          # For now, just report current run
          echo "## Latest Run Results" >> trend.md
          echo "See artifacts for detailed reports" >> trend.md

      - name: Upload Trend Report
        uses: actions/upload-artifact@v4
        with:
          name: trend-report
          path: trend.md
          retention-days: 90
