name: Test Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Job 1: API Tests
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run API Tests
        working-directory: automation/api
        run: |
          mvn clean test -Dgroups=smoke,regression
        continue-on-error: false

      - name: Generate Allure Report
        if: always()
        working-directory: automation/api
        run: mvn allure:report

      - name: Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            automation/api/target/surefire-reports/
            automation/api/target/allure-results/
            automation/api/target/logs/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: automation/api/target/site/allure-maven-plugin/
          retention-days: 30

      - name: Test Report Summary
        if: always()
        working-directory: automation/api
        run: |
          echo "## API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/testng-results.xml ]; then
            TOTAL=$(grep -oP 'total="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            PASSED=$(grep -oP 'passed="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            FAILED=$(grep -oP 'failed="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            SKIPPED=$(grep -oP 'skipped="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            echo "- **Total Tests:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** ✅ $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** ❌ $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped:** ⏭️ $SKIPPED" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 2: UI Tests
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify Chrome installation
        run: |
          which google-chrome-stable
          google-chrome-stable --version

      - name: Run UI Tests (Headless)
        working-directory: automation/ui
        run: |
          mvn clean test -Dgroups=smoke,regression -Dheadless=true
        continue-on-error: false

      - name: Generate Allure Report
        if: always()
        working-directory: automation/ui
        run: mvn allure:report

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            automation/ui/target/surefire-reports/
            automation/ui/target/allure-results/
            automation/ui/target/logs/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-report
          path: automation/ui/target/site/allure-maven-plugin/
          retention-days: 30

      - name: Upload Screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: automation/ui/target/screenshots/
          retention-days: 14

      - name: Test Report Summary
        if: always()
        working-directory: automation/ui
        run: |
          echo "## UI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/testng-results.xml ]; then
            TOTAL=$(grep -oP 'total="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            PASSED=$(grep -oP 'passed="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            FAILED=$(grep -oP 'failed="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            SKIPPED=$(grep -oP 'skipped="\K[^"]+' target/surefire-reports/testng-results.xml | head -1)
            echo "- **Total Tests:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** ✅ $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** ❌ $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped:** ⏭️ $SKIPPED" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 3: Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Download API Test Results
        uses: actions/download-artifact@v4
        with:
          name: api-test-results
          path: api-results

      - name: Download UI Test Results
        uses: actions/download-artifact@v4
        with:
          name: ui-test-results
          path: ui-results

      - name: Generate Combined Summary
        run: |
          echo "# 🧪 Test Automation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # API Tests
          if [ -f api-results/surefire-reports/testng-results.xml ]; then
            echo "## 🚀 API Tests" >> $GITHUB_STEP_SUMMARY
            API_TOTAL=$(grep -oP 'total="\K[^"]+' api-results/surefire-reports/testng-results.xml | head -1)
            API_PASSED=$(grep -oP 'passed="\K[^"]+' api-results/surefire-reports/testng-results.xml | head -1)
            API_FAILED=$(grep -oP 'failed="\K[^"]+' api-results/surefire-reports/testng-results.xml | head -1)
            echo "- Total: $API_TOTAL | Passed: ✅ $API_PASSED | Failed: ❌ $API_FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # UI Tests
          if [ -f ui-results/surefire-reports/testng-results.xml ]; then
            echo "## 🎭 UI Tests" >> $GITHUB_STEP_SUMMARY
            UI_TOTAL=$(grep -oP 'total="\K[^"]+' ui-results/surefire-reports/testng-results.xml | head -1)
            UI_PASSED=$(grep -oP 'passed="\K[^"]+' ui-results/surefire-reports/testng-results.xml | head -1)
            UI_FAILED=$(grep -oP 'failed="\K[^"]+' ui-results/surefire-reports/testng-results.xml | head -1)
            echo "- Total: $UI_TOTAL | Passed: ✅ $UI_PASSED | Failed: ❌ $UI_FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [API Test Results](../actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "- [UI Test Results](../actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "- [Allure Reports](../actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY

      - name: Check Test Results
        run: |
          if [ "${{ needs.api-tests.result }}" != "success" ] || [ "${{ needs.ui-tests.result }}" != "success" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
